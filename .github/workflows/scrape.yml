name: Gym Scraper (cada 5 min)

# El disparo real cada 5 min lo hace un cron EXTERNO (cron-job.org) llamando
# a la API de workflow_dispatch. El "schedule" de aqui es solo un respaldo de
# baja frecuencia: GitHub retrasa/descarta con frecuencia los cron internos
# de */5 min bajo carga alta (confirmado empiricamente: huecos de 1-3h en
# vez de 5 min), pero los intervalos de 30 min son mucho mas fiables.
on:
  schedule:
    - cron: '0,30 7-22 * * *'
  workflow_dispatch:

# Serializa los runs: nunca dos a la vez (evita carreras en el push)
concurrency:
  group: gym-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
        run: |
          python src/scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history.csv data/latest.json data/estado.txt
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
            exit 0
          fi
          git commit -m "Update gym data - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          # Reintenta rebase + push por si otro run se adelanta
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master && git push && exit 0
            echo "Push fallido (intento $i), reintentando..."
            sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"
          exit 1

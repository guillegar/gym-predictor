name: Gym Scraper (cada 5 min)

on:
  schedule:
    # Cada 5 minutos, solo entre 7:00 y 22:55 UTC
    - cron: '*/5 7-22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python src/scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/latest.json data/gym_data.db
          git pull --rebase
          git diff --quiet && git diff --staged --quiet || git commit -m "Update gym data - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push

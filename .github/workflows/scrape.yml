name: Gym Scraper (cada 5 min)

on:
  schedule:
    # Cada 5 minutos, solo entre 7:00 y 22:55 UTC
    - cron: '*/5 7-22 * * *'
  workflow_dispatch:

# Serializa los runs: nunca dos a la vez (evita carreras en el push)
concurrency:
  group: gym-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python src/scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history.csv data/latest.json
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
            exit 0
          fi
          git commit -m "Update gym data - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          # Reintenta rebase + push por si otro run se adelanta
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master && git push && exit 0
            echo "Push fallido (intento $i), reintentando..."
            sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"
          exit 1
